<style> 
    /* 基础样式 */
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    *:not(input, checkbox, textarea) {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
    }

    body,
    html {
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    .container {
        display: flex;
        width: 650px;
        height: 500px;
        position: absolute;
        top: calc(50% - 200px);
        left: calc(50% - 325px);
        background-color: rgb(236, 243, 242);
        border-radius: 10px;
    }

    .sidebar {
        flex: 0 0 135px;
        width: 135px;
        background: linear-gradient(135deg, #a8ff78, #333399);
        color: white;
        padding: 10px 10px;
        display: flex;
        flex-direction: column;
        position: relative;
        border-radius: 10px 0 0 10px;
    }

    .sidebar h2 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        padding: 4px 6px;
        width: calc(100% - 12px);
    }

    .sidebar-divider {
        border-top: 1px solid rgba(255, 255, 255, 0.5);
        margin: 0 0 5px 0;
    }

    .sidebar-item {
        height: 28px;
        display: flex;
        align-items: center;
        margin-bottom: 8px;
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 3px;
        transition: background-color 0.3s, box-shadow 0.3s, border 0.3s;
        font-size: 14px;
        border: 2px solid transparent;
        box-shadow: none;
    }

    .sidebar-item:hover,
    .sidebar-item.active {
        background-color: rgba(255, 255, 255, 0.1);
    }

    .sidebar-item.active {
        border-radius: 10px;
        border: 1px double rgba(51, 51, 51, 0.08);
        box-shadow: inset 2px -2px 1px -1px rgba(255, 255, 255, 0.9), inset -2px 2px 1px -1px rgba(255, 255, 255, 0.9), inset 6px -6px 1px -6px rgba(255, 255, 255, 0.55), inset -6px 6px 1px -6px rgba(255, 255, 255, 0.55), inset 0 0 2px rgba(0, 0, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        filter: brightness(0.9);
        font-weight: bold;
        color: #fff;
    }

    .sidebar-item i {
        margin-right: 8px;
        font-size: 16px;
        width: 18px;
        text-align: center;
    }

    .main-content {
        flex: 1 1 auto;
        padding: 15px;
        overflow-y: auto;
    }

    .content-section {
        display: none;
    }

    .content-section.active-section {
        display: block;
    }

    .banner-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        width: 100%;
        height: 280px;
        margin-bottom: 10px;
        margin-top: 5px;
    }

    .banner {
        width: 100%;
        height: 100%;
        display: block;
        background-image: url('./NBA 2K26.png');
        background-size: cover;
        background-position: center;
        position: relative;
    }

    .banner::after {
        content: 'NBA 2K26';
        position: absolute;
        right: 10px;
        bottom: 10px;
        font-size: 24px;
        font-weight: bold;
        color: white;
    }

    .banner::before {
        content: '游戏未运行';
        position: absolute;
        right: 5px;
        top: 5px;
        border-radius: 10px;
        border: 1px double rgba(51, 51, 51, 0.08);
        box-shadow: inset 2px -2px 1px -1px rgba(255, 255, 255, 0.9), inset -2px 2px 1px -1px rgba(255, 255, 255, 0.9), inset 6px -6px 1px -6px rgba(255, 255, 255, 0.55), inset -6px 6px 1px -6px rgba(255, 255, 255, 0.55), inset 0 0 2px rgba(0, 0, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        filter: brightness(0.9);
        font-weight: bold;
        color: #fff;
        padding: 3px 8px;
        border-radius: 3px;
        font-size: 12px;
    }

    .banner.running::before {
        content: '游戏运行中';
        border-radius: 10px;
        border: 1px double rgba(51, 51, 51, 0.08);
        box-shadow: inset 2px -2px 1px -1px rgba(255, 255, 255, 0.9), inset -2px 2px 1px -1px rgba(255, 255, 255, 0.9), inset 6px -6px 1px -6px rgba(255, 255, 255, 0.55), inset -6px 6px 1px -6px rgba(255, 255, 255, 0.55), inset 0 0 2px rgba(0, 0, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.2);

    setWindowDrag(0, 0, 0, 0);

    // 布局函数
    var layout = function () {
        // window.orientation是设备握持方向, 不是屏幕显示方向
        if (window.lastorientation == window.orientation) return;
        window.lastorientation = window.orientation;
        // window.screen中的宽高不会随着屏幕旋转更新(只会在初始化的时候固定)
        if (Math.abs(window.orientation) == 90) {
            // 横屏模式
            setWindowRect(0, 0, window.screen.height, window.screen.width);
        } else {
            // 竖屏模式
            setWindowRect(0, 0, window.screen.width, window.screen.height);
        }
    }

    // 设置旋转屏幕时自动调整布局和画布
    layout();
    window.addEventListener("orientationchange", layout, true);

    // 设置自定义的悬浮按钮图标点击动作

            setWindowTouch(false);
